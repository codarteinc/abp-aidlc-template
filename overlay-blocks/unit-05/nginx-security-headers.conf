# Audit finding F-012 — defense-in-depth security headers on the SPA edge.
# CSP ships in Report-Only mode for the first 7-14 days after deploy; flip
# to `Content-Security-Policy` (enforce) once the operator-supplied
# report-uri shows zero false-positive violations. `connect-src` must
# include the API host origin — operator templatizes per environment (this
# scaffold ships `'self'` only; add the API origin via SSI / envsubst at
# deploy time).
# `always` ensures the headers ship on error pages (4xx/5xx) too.
#
# `report-uri /csp-report` is a same-origin placeholder that returns 204
# from the local `location /csp-report` block below. Operators MUST
# repoint this to a real CSP-report collector at deploy time (e.g.
# `report-uri https://sentry.io/api/<project>/security/?sentry_key=...`,
# csper.io, or a custom endpoint). Leaving the placeholder in production
# silently drops every violation report on the floor.
add_header Content-Security-Policy-Report-Only "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri /csp-report" always;
# F-010 — HSTS at 30 days, NO includeSubDomains, NO preload. Operator
# bumps to 1 year after the soak; `preload` is irrevocable in practice
# (browsers cache the preload entry) and requires explicit operator
# sign-off.
add_header Strict-Transport-Security "max-age=2592000" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Same-origin 204 stub for the CSP `report-uri` directive above. Returns
# 204 No Content so the SPA doesn't accumulate 404 noise during the
# report-only soak. NEVER log the request body — CSP reports can carry
# origin URLs that include sensitive query strings.
location = /csp-report {
    return 204;
}
